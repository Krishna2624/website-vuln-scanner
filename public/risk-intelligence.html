<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Risk Intelligence</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.35), transparent 30%),
        radial-gradient(circle at bottom right, rgba(168,85,247,0.30), transparent 30%),
        linear-gradient(135deg, #020617, #0f172a, #111827);
      color: white;
      padding: 30px;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 30px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      margin-bottom: 30px;
      box-shadow: 0 20px 45px rgba(0,0,0,0.35);
    }

    .navbar h1 {
      font-size: 28px;
      font-weight: 700;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      margin-left: 18px;
      font-weight: 500;
      padding: 10px 18px;
      border-radius: 12px;
    }

    .nav-links a:hover {
      background: rgba(255,255,255,0.08);
      color: #93c5fd;
    }

    .hero-grid {
    display: block;
    margin-bottom: 25px;
    }

    .glass-card {
    position: relative;
    overflow: hidden;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 24px;
    padding: 28px;
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    box-shadow:
        0 20px 45px rgba(0,0,0,0.25),
        inset 0 1px 0 rgba(255,255,255,0.10);
    transition: 0.4s;
    margin-bottom: 25px;
    }

    .glass-card::before {
    content: "";
    position: absolute;
    top: -40%;
    left: -40%;
    width: 180%;
    height: 180%;
    background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.18),
        transparent
    );
    transform: rotate(25deg);
    opacity: 0;
    transition: 0.6s;
    pointer-events: none;
    }

    .glass-card:hover::before {
    opacity: 1;
    left: 100%;
    }

    .glass-card:hover {
    transform: translateY(-4px);
    border-color: rgba(96,165,250,0.45);
    }

    .section-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 18px;
      color: #93c5fd;
    }

    .score-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 35px;
      flex-wrap: wrap;
    }

    .gauge {
      width: 230px;
      height: 230px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        conic-gradient(#22c55e 0deg, #eab308 100deg, #f97316 200deg, #ef4444 300deg, rgba(255,255,255,0.12) 300deg);
      position: relative;
    }

    .gauge::before {
      content: "";
      width: 170px;
      height: 170px;
      background: #0f172a;
      border-radius: 50%;
      position: absolute;
    }

    .score-text {
      position: relative;
      text-align: center;
      z-index: 2;
    }

    .score-text h2 {
      font-size: 48px;
      line-height: 1;
    }

    .score-text p {
      color: #cbd5e1;
      font-weight: 600;
    }

    .risk-badge {
      display: inline-block;
      margin-top: 12px;
      padding: 8px 16px;
      border-radius: 999px;
      font-weight: 700;
      background: rgba(239,68,68,0.22);
      color: #fecaca;
    }

    .metric-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 18px;
    margin-top: 30px;
    width: 100%;    
    }

    .metric {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 18px;
      text-align: center;
    }

    .metric h3 {
      font-size: 30px;
    }

    .metric p {
      color: #cbd5e1;
      font-size: 13px;
    }

    .donut-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }

    .donut {
      width: 210px;
      height: 210px;
      border-radius: 50%;
      background: conic-gradient(
        #7f1d1d 0deg 0deg,
        #ef4444 0deg 80deg,
        #eab308 80deg 180deg,
        #22c55e 180deg 360deg
      );
      position: relative;
    }

    .donut::after {
      content: "";
      position: absolute;
      inset: 45px;
      background: #0f172a;
      border-radius: 50%;
    }

    .legend {
      display: grid;
      gap: 12px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #e2e8f0;
    }

    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
    }

    .critical-dot { background: #7f1d1d; }
    .high-dot { background: #ef4444; }
    .medium-dot { background: #eab308; }
    .low-dot { background: #22c55e; }

    .surface-map {
    position: relative;
    min-height: 520px;
    display: grid;
    place-items: center;
    overflow: hidden;
    }

    .target-node {
    width: 240px;
    min-height: 140px;
    border-radius: 28px;
    background:
        linear-gradient(135deg, #2563eb, #7c3aed);
    display: grid;
    place-items: center;
    text-align: center;
    padding: 20px;
    box-shadow:
        0 0 55px rgba(59,130,246,0.45),
        0 20px 50px rgba(0,0,0,0.30);
    z-index: 3;
    }

    .node {
    position: absolute;
    width: 170px;
    min-height: 90px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 22px;
    padding: 16px;
    text-align: center;
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    box-shadow:
        0 18px 40px rgba(0,0,0,0.25),
        inset 0 1px 0 rgba(255,255,255,0.08);
    transition: 0.3s;
    }

    .node:hover {
    transform: translateY(-6px);
    border-color: rgba(96,165,250,0.45);
    }

    .node h4 {
      font-size: 15px;
      margin-bottom: 5px;
    }

    .node p {
      font-size: 13px;
      color: #cbd5e1;
    }

    .n1 { top: 30px; left: 50%; transform: translateX(-50%); }
    .n2 { top: 165px; right: 90px; }
    .n3 { bottom: 95px; right: 120px; }
    .n4 { bottom: 95px; left: 120px; }
    .n5 { top: 165px; left: 90px; }
    .n6 { bottom: 35px; left: 50%; transform: translateX(-50%); }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
      margin-bottom: 25px;
    }

    .bar-row {
      margin-bottom: 16px;
    }

    .bar-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 7px;
      color: #e2e8f0;
      font-size: 14px;
    }

    .bar-bg {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.10);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #2563eb, #ef4444);
    }

    .priority-list {
      display: grid;
      gap: 14px;
    }

    .priority-item {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .priority-item strong {
      color: #fca5a5;
    }

    .priority-item p {
      color: #cbd5e1;
      font-size: 13px;
      margin-top: 5px;
    }

    .timeline {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }

    .timeline-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 20px;
    }

    .timeline-card h3 {
      color: #93c5fd;
      margin-bottom: 10px;
    }

    .timeline-card ul {
      padding-left: 18px;
      color: #cbd5e1;
      line-height: 1.8;
    }

    .impact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }

    .impact-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 20px;
    }

    .impact-card h3 {
      margin-bottom: 8px;
    }

    .impact-card p {
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.7;
    }

    .command-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 30px;
    }

    .risk-orb {
    position: relative;
    width: 260px;
    height: 260px;
    display: grid;
    place-items: center;
    }

    .orb-glow {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background:

    filter: blur(10px);
    animation: rotateOrb 6s linear infinite;
    }

    .orb-inner {
    position: relative;
    width: 205px;
    height: 205px;
    border-radius: 50%;
    background:
        radial-gradient(circle at top, rgba(255,255,255,0.18), transparent 28%),
        linear-gradient(145deg, #020617, #111827);
    border: 1px solid rgba(255,255,255,0.22);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow:
        inset 0 0 35px rgba(59,130,246,0.22),
        0 0 45px rgba(59,130,246,0.25);
    z-index: 2;
    }

    .score-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: #93c5fd;
    margin-bottom: 6px;
    }

    .orb-inner h2 {
    font-size: 58px;
    line-height: 1;
    }

    .orb-inner p {
    color: #cbd5e1;
    font-weight: 600;
    }

    .risk-summary-panel h2 {
    font-size: 30px;
    margin-bottom: 12px;
    text-align: center;
    }

    .risk-summary-panel p {
    color: #cbd5e1;
    line-height: 1.8;
    max-width: 850px;
    margin: 0 auto;
    text-align: center;
    }

    .risk-meter {
    margin-top: 22px;
    width: 100%;
    height: 14px;
    border-radius: 999px;
    background: linear-gradient(90deg, #ef4444, #f97316, #eab308, #22c55e);
    overflow: hidden;
    }

    .risk-meter-fill {
    height: 100%;
    background: rgba(255,255,255,0.92);
    border-radius: 999px;
    box-shadow: 0 0 20px rgba(255,255,255,0.7);
    }

    .risk-meter-labels {
    display: flex;
    justify-content: space-between;
    color: #94a3b8;
    font-size: 12px;
    margin-top: 8px;
    }

    .owasp-detail-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 18px;
    }

    .owasp-detail-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.13);
    border-radius: 20px;
    padding: 20px;
    transition: 0.3s;
    }

    .owasp-detail-card:hover {
    transform: translateY(-4px);
    border-color: rgba(96,165,250,0.45);
    }

    .owasp-tag {
    display: inline-block;
    padding: 7px 12px;
    border-radius: 999px;
    background: rgba(59,130,246,0.20);
    color: #93c5fd;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 12px;
    }

    .owasp-detail-card h3 {
    font-size: 17px;
    margin-bottom: 10px;
    }

    .owasp-detail-card p {
    color: #cbd5e1;
    font-size: 13px;
    line-height: 1.7;
    margin-top: 7px;
    }

    @keyframes rotateOrb {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
    }

    .score-breakdown {
    display: grid;
    grid-template-columns: 160px 1fr 160px;
    gap: 20px;
    align-items: stretch;
    }

    .score-base,
    .score-final {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 20px;
    padding: 22px;
    text-align: center;
    backdrop-filter: blur(14px);
    box-shadow:
        0 15px 35px rgba(0,0,0,0.20),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .score-base h3,
    .score-final h3 {
    font-size: 42px;
    }

    .score-base p,
    .score-final p {
    color: #cbd5e1;
    font-size: 13px;
    }

    .score-minus-list {
    display: grid;
    gap: 12px;
    }

    .score-minus-item {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 14px;
    align-items: center;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 16px;
    padding: 14px 16px;
    backdrop-filter: blur(14px);
    }

    .score-minus-item span {
    color: #e2e8f0;
    font-weight: 500;
    }

    .score-minus-item strong {
    color: #fca5a5;
    }

    .score-minus-item small {
    color: #94a3b8;
    }


    @media (max-width: 950px) {
      .hero-grid,
      .grid-2 {
        grid-template-columns: 1fr;
      }

      .score-breakdown {
        grid-template-columns: 1fr;
        }

        .score-minus-item {
        grid-template-columns: 1fr;
        }

      .glass-card {

      .surface-map {

      }

      }

      }

      .command-center {
        display: flex;

        }

        .risk-summary-panel {

        }

        .risk-orb {

        height: 230px;
        }

        .orb-inner {
        width: 185px;
        height: 185px;
        }


    }

  <script>
    const riskContent = document.getElementById("riskContent");

function protectPage() {
  const token = localStorage.getItem("token");

  if (!token) {
    window.location.href = "auth.html";
  }
}
function logout() {
  localStorage.clear();
  window.location.href = "auth.html";
}
protectPage();

    function getSeverityScore(severity) {
      if (!severity) return 0;
      const s = severity.toLowerCase();
      if (s.includes("critical")) return 25;
      if (s.includes("high")) return 15;
      if (s.includes("medium")) return 8;
      if (s.includes("low")) return 3;
      return 1;
    }

    function calculateRiskScore(scan) {
      const website = scan.website || {};
      const ports = scan.ports || {};

      const critical = website.summary?.critical || 0;
      const high = website.summary?.high || 0;
      const medium = website.summary?.medium || 0;
      const low = website.summary?.low || 0;

      const openPorts = ports.openPorts || 0;
      const criticalCves = ports.criticalCves || 0;
      const highCves = ports.highCves || 0;

      let penalty = 0;
      penalty += critical * 25;
      penalty += high * 15;
      penalty += medium * 8;
      penalty += low * 3;
      penalty += openPorts * 4;
      penalty += criticalCves * 20;
      penalty += highCves * 12;

      let score = Math.max(0, 100 - penalty);
      return score;
    }

    function buildRiskBreakdown(scan) {
    const website = scan.website || {};
    const ports = scan.ports || {};

    const breakdown = [];

    const critical = website.summary?.critical || 0;
    const high = website.summary?.high || 0;
    const medium = website.summary?.medium || 0;
    const low = website.summary?.low || 0;

    const openPorts = ports.openPorts || 0;
    const criticalCves = ports.criticalCves || 0;
    const highCves = ports.highCves || 0;

    if (critical > 0) breakdown.push({ label: "Critical Website Findings", value: critical, penalty: critical * 25 });
    if (high > 0) breakdown.push({ label: "High Website Findings", value: high, penalty: high * 15 });
    if (medium > 0) breakdown.push({ label: "Medium Website Findings", value: medium, penalty: medium * 8 });
    if (low > 0) breakdown.push({ label: "Low Website Findings", value: low, penalty: low * 3 });
    if (openPorts > 0) breakdown.push({ label: "Open Network Ports", value: openPorts, penalty: openPorts * 4 });
    if (criticalCves > 0) breakdown.push({ label: "Critical CVE Exposure", value: criticalCves, penalty: criticalCves * 20 });
    if (highCves > 0) breakdown.push({ label: "High CVE Exposure", value: highCves, penalty: highCves * 12 });

    return breakdown;
    }

    function buildDynamicRemediation(scan) {
    const immediate = [];
    const week = [];
    const month = [];

    const findings = scan.website?.findings || [];
    const ports = scan.ports?.results || [];
    const headers = scan.website?.headerFindings || [];
    const cookies = scan.website?.cookieFindings || [];

    ports.forEach(p => {
        if (p.status === "Open" && (p.cveSeverity === "Critical" || p.cveSeverity === "High")) {
        immediate.push(`Patch or restrict ${p.service} on port ${p.port}`);
        }
    });

    findings.forEach(f => {
        if (f.severity === "Critical" || f.severity === "High") {
        immediate.push(f.solution || `Fix ${f.title}`);
        } else if (f.severity === "Medium") {
        week.push(f.solution || `Review ${f.title}`);
        }
    });

    headers.forEach(h => {
        if (h.status === "Missing") {
        week.push(`Configure ${h.name}`);
        }
    });

    const weakCookies = cookies.filter(c => !c.secure || !c.httpOnly || !c.sameSite);
    if (weakCookies.length > 0) {
        week.push("Harden cookie attributes: Secure, HttpOnly, and SameSite");
    }

    if (scan.subdomains?.totalFound > 0) {
        month.push("Review discovered subdomains and remove unused public assets");
    }

    month.push("Schedule recurring scans and compare risk trends");
    month.push("Generate monthly executive security reports");

    return {
        immediate: [...new Set(immediate)].slice(0, 5),
        week: [...new Set(week)].slice(0, 5),
        month: [...new Set(month)].slice(0, 5)
    };
    }
    
    function getRiskLevel(score) {
      if (score >= 85) return "Low Risk";
      if (score >= 65) return "Medium Risk";
      if (score >= 40) return "High Risk";
      return "Critical Risk";
    }

    function buildPriorityIssues(scan) {
      const issues = [];

      const findings = scan.website?.findings || [];
      findings.forEach(f => {
        issues.push({
          title: f.title || "Website Finding",
          severity: f.severity || "Info",
          impact: f.risk || "Security weakness detected",
          fix: f.solution || "Review and remediate the finding"
        });
      });

      const portResults = scan.ports?.results || [];
      portResults
        .filter(p => p.status === "Open")
        .forEach(p => {
          issues.push({
            title: `Open ${p.service} Port (${p.port})`,
            severity: p.cveSeverity || p.risk || "Medium",
            impact: p.cveDescription || "Exposed network service detected",
            fix: p.cveRecommendation || p.recommendation || "Restrict or secure this service"
          });
        });

      return issues
        .sort((a, b) => getSeverityScore(b.severity) - getSeverityScore(a.severity))
        .slice(0, 5);
    }

    function buildOwaspMapping(scan) {
      const map = {
        "A02 Cryptographic Failures": 0,
        "A03 Injection": 0,
        "A05 Security Misconfiguration": 0,
        "A06 Vulnerable & Outdated Components": 0,
        "A07 Identification & Authentication Failures": 0
      };

      const findings = scan.website?.findings || [];
      findings.forEach(f => {
        const title = (f.title || "").toLowerCase();

        if (title.includes("content security policy") || title.includes("script")) {
          map["A03 Injection"]++;
        }

        if (
          title.includes("hsts") ||
          title.includes("x-frame") ||
          title.includes("server") ||
          title.includes("technology") ||
          title.includes("header")
        ) {
          map["A05 Security Misconfiguration"]++;
        }
      });

      const cookies = scan.website?.cookieFindings || [];
      cookies.forEach(c => {
        if (!c.secure || !c.httpOnly || !c.sameSite) {
          map["A02 Cryptographic Failures"]++;
        }
      });

      const ports = scan.ports?.results || [];
      ports.forEach(p => {
        if (p.status === "Open") {
          map["A05 Security Misconfiguration"]++;
        }

        if (
          p.cveId &&
          p.cveId !== "N/A" &&
          p.cveId !== "No direct CVE mapped"
        ) {
          map["A06 Vulnerable & Outdated Components"]++;
        }
      });

      return map;
    }

    function renderRiskPage(scan) {
      const score = calculateRiskScore(scan);
      const riskBreakdown = buildRiskBreakdown(scan);

      const riskLevel = getRiskLevel(score);

      const website = scan.website || {};
      const dns = scan.dns || {};
      const ports = scan.ports || {};
      const subdomains = scan.subdomains || {};

      const critical = website.summary?.critical || 0;
      const high = website.summary?.high || 0;
      const medium = website.summary?.medium || 0;
      const low = website.summary?.low || 0;

      const totalSeverity = critical + high + medium + low || 1;
      const criticalDeg = (critical / totalSeverity) * 360;
      const highDeg = criticalDeg + (high / totalSeverity) * 360;
      const mediumDeg = highDeg + (medium / totalSeverity) * 360;

      const priorityIssues = buildPriorityIssues(scan);
      const owaspMap = buildOwaspMapping(scan);
      const detailedOwasp = buildDetailedOwaspMapping(scan);
      const maxOwasp = Math.max(...Object.values(owaspMap), 1);

      riskContent.innerHTML = `
        <div style="margin-bottom:25px;">

                    <span>Low</span>
                    </div>

                    <div class="metric-grid">
                    <div class="metric"><h3>${website.summary?.totalFindings || 0}</h3><p>Findings</p></div>
                    <div class="metric"><h3>${ports.openPorts || 0}</h3><p>Open Ports</p></div>
                    <div class="metric"><h3>${ports.criticalCves || 0}</h3><p>Critical CVEs</p></div>
                    <div class="metric"><h3>${subdomains.totalFound || 0}</h3><p>Subdomains</p></div>
                    </div>
                </div>

                </div>

          

            <div style="margin-bottom:25px;">
                <div class="section-title" style="margin-bottom:20px;">
                    Attack Surface Map
                </div>

          <div class="surface-map">
            <div class="node n1">
              <h4>CVEs</h4>
              <p>${ports.criticalCves || 0} Critical / ${ports.highCves || 0} High</p>
            </div>

            <div class="node n2">
              <h4>Open Ports</h4>
              <p>${ports.openPorts || 0} exposed services</p>
            </div>

            <div class="node n3">
              <h4>Subdomains</h4>
              <p>${subdomains.totalFound || 0} assets found</p>
            </div>

            <div class="node n4">
              <h4>DNS</h4>
              <p>${dns.A?.length || 0} A records</p>
            </div>

            <div class="node n5">
              <h4>SSL / Headers</h4>
              <p>${website.headerFindings?.filter(h => h.status === "Missing").length || 0} missing headers</p>
            </div>

            <div class="node n6">
              <h4>Cookies</h4>
              <p>${website.cookieFindings?.length || 0} reviewed</p>
            </div>

            <div class="target-node">
              <div>
                <h3>${scan.domain || "Target Domain"}</h3>
                <p>${scan.target || ""}</p>
              </div>
            </div>
          </div>
        </div>

        <div class="glass-card" style="margin-bottom:25px;">
            <div class="section-title">Severity Distribution</div>

            <div class="donut-wrap">
              <div
                class="donut"
                style="background: conic-gradient(
                  #7f1d1d 0deg ${criticalDeg}deg,
                  #ef4444 ${criticalDeg}deg ${highDeg}deg,
                  #eab308 ${highDeg}deg ${mediumDeg}deg,
                  #22c55e ${mediumDeg}deg 360deg
                );"
              ></div>

              <div class="legend">
                <div class="legend-item"><span class="dot critical-dot"></span> Critical: ${critical}</div>
                <div class="legend-item"><span class="dot high-dot"></span> High: ${high}</div>
                <div class="legend-item"><span class="dot medium-dot"></span> Medium: ${medium}</div>
                <div class="legend-item"><span class="dot low-dot"></span> Low: ${low}</div>
              </div>
            </div>
          </div>
        </div>

        <div class="grid-2">
          <div class="glass-card">
            <div class="section-title">OWASP Top 10 Mapping</div>

            ${
              Object.entries(owaspMap).map(([name, count]) => `
                <div class="bar-row">
                  <div class="bar-label">
                    <span>${name}</span>
                    <span>${count}</span>
                  </div>
                  <div class="bar-bg">
                    <div class="bar-fill" style="width:${(count / maxOwasp) * 100}%"></div>
                  </div>
                </div>
              `).join("")
            }
          </div>

          <div class="glass-card">
            <div class="section-title">Risk Score Breakdown</div>

            <div class="score-breakdown">
                <div class="score-base">
                <h3>100</h3>
                <p>Base Score</p>
                </div>

                <div class="score-minus-list">
                ${
                    riskBreakdown.length
                    ? riskBreakdown.map(item => `
                        <div class="score-minus-item">
                        <span>${item.label}</span>
                        <strong>-${item.penalty}</strong>
                        <small>${item.value} detected</small>
                        </div>
                    `).join("")
                    : `<div class="score-minus-item"><span>No major penalties detected</span><strong>0</strong><small>Clean posture</small></div>`
                }
                </div>

                <div class="score-final">
                <h3>${score}</h3>
                <p>Final Score</p>
                </div>
            </div>
            </div>



          <div class="glass-card">
            <div class="section-title">Top Priority Fixes</div>

            <div class="priority-list">
              ${
                priorityIssues.length
                  ? priorityIssues.map((issue, index) => `
                    <div class="priority-item">
                      <strong>${index + 1}. ${issue.title} — ${issue.severity}</strong>
                      <p>${issue.impact}</p>

                  `).join("")
                  : `<div class="priority-item">No priority issues detected.</div>`
              }
            </div>
          </div>
        </div>

        <div class="glass-card" style="margin-bottom:25px;">
            <div class="section-title">OWASP Detailed Vulnerability Mapping</div>

            <div class="owasp-detail-grid">
                ${
                detailedOwasp.length
                    ? detailedOwasp.map(item => `
                    <div class="owasp-detail-card">
                        <div class="owasp-tag">${item.owasp}</div>

                        <p><strong>Severity:</strong> ${item.severity}</p>

                    </div>
                    `).join("")
                    : `<div class="owasp-detail-card">No OWASP-mapped issues detected.</div>`
                }
            </div>
            </div>

            <div class="glass-card" style="margin-bottom:25px;">
              <div class="section-title">Historical Risk Timeline</div>

        <div class="glass-card" style="margin-bottom:25px;">
          <div class="section-title">Remediation Roadmap</div>

          <div class="timeline">
            <div class="timeline-card">
                <h3>Immediate</h3>
                <ul>
                ${
                    remediation.immediate.length
                    ? remediation.immediate.map(item => `<li>${item}</li>`).join("")
                    : `<li>No urgent critical actions detected</li>`
                }
                </ul>
            </div>

            <div class="timeline-card">
                <h3>This Week</h3>
                <ul>
                ${
                    remediation.week.length
                    ? remediation.week.map(item => `<li>${item}</li>`).join("")
                    : `<li>Review medium-risk findings and security configuration</li>`
                }
                </ul>
            </div>

            <div class="timeline-card">
                <h3>This Month</h3>
                <ul>
                ${
                    remediation.month.length
                    ? remediation.month.map(item => `<li>${item}</li>`).join("")
                    : `<li>Set up recurring scans and monthly executive reporting</li>`
                }
                </ul>
            </div>
            </div>
        </div>

        <div class="glass-card">
          <div class="section-title">Business Impact View</div>

          <div class="impact-grid">
            <div class="impact-card">
              <h3>Customer Data Risk</h3>
              <p>Injection-related issues and weak headers may increase the risk of data exposure or browser-side attacks.</p>
            </div>

            <div class="impact-card">
              <h3>Service Exposure</h3>
              <p>Open ports and public services increase the attack surface and should be minimized.</p>
            </div>

            <div class="impact-card">
              <h3>Compliance Risk</h3>
              <p>Security misconfigurations can affect alignment with OWASP, ISO 27001, GDPR, DPDPA, and internal policies.</p>
            </div>

            <div class="impact-card">
              <h3>Reputation Risk</h3>
              <p>Unfixed vulnerabilities can lead to incidents that impact trust, availability, and brand reputation.</p>
            </div>
          </div>
        </div>
      `;
    }

    function buildDetailedOwaspMapping(scan) {
        const grouped = {};

        function addMapping(owasp, vulnerability, severity, reason, recommendation) {
            const key = owasp + "|" + vulnerability;

            if (!grouped[key]) {
            grouped[key] = {
                owasp,
                vulnerability,
                severity,
                reason,
                recommendation,
                count: 1
            };
            } else {
            grouped[key].count++;
            }
        }

        const findings = scan.website?.findings || [];

        findings.forEach(f => {
            const title = (f.title || "").toLowerCase();

            if (title.includes("content security policy") || title.includes("script")) {
            addMapping(
                "A03:2021 Injection",
                "Script Injection / Missing CSP Risk",
                f.severity || "High",
                "Weak script control can increase injection and XSS exposure.",
                "Implement a strong Content-Security-Policy and sanitize user-controlled output."
            );
            }

            else if (title.includes("hsts")) {
            addMapping(
                "A05:2021 Security Misconfiguration",
                "Missing HSTS Header",
                f.severity || "Medium",
                "Missing HSTS can expose users to SSL stripping attacks.",
                "Enable Strict-Transport-Security with secure max-age configuration."
            );
            }

            else if (title.includes("clickjacking") || title.includes("x-frame")) {
            addMapping(
                "A05:2021 Security Misconfiguration",
                "Clickjacking Protection Missing",
                f.severity || "Medium",
                "Missing frame protection allows the site to be embedded by attackers.",
                "Add X-Frame-Options or CSP frame-ancestors directive."
            );
            }

            else if (title.includes("server") || title.includes("technology")) {
            addMapping(
                "A05:2021 Security Misconfiguration",
                "Technology / Server Information Disclosure",
                f.severity || "Low",
                "Technology disclosure helps attackers fingerprint the environment.",
                "Hide unnecessary Server and X-Powered-By headers."
            );
            }

            else {
            addMapping(
                "A05:2021 Security Misconfiguration",
                f.title || "Security Misconfiguration",
                f.severity || "Info",
                "This issue is related to insecure or missing security configuration.",
                f.solution || "Review and remediate this finding."
            );
            }
        });

        const cookies = scan.website?.cookieFindings || [];

        let weakCookieCount = 0;

        cookies.forEach(c => {
            if (!c.secure || !c.httpOnly || !c.sameSite) {
            weakCookieCount++;
            }
        });

        if (weakCookieCount > 0) {
            addMapping(
            "A02:2021 Cryptographic Failures",
            "Weak Cookie Security",
            "Medium",
            "One or more cookies are missing Secure, HttpOnly, or SameSite attributes.",
            "Set Secure, HttpOnly, and SameSite attributes for sensitive cookies."
            );

            grouped["A02:2021 Cryptographic Failures|Weak Cookie Security"].count = weakCookieCount;
        }

        const ports = scan.ports?.results || [];

        let openPortCount = 0;
        let cveCount = 0;

        ports.forEach(p => {
            if (p.status === "Open") {
            openPortCount++;
            }

            if (
            p.cveId &&
            p.cveId !== "N/A" &&
            p.cveId !== "No direct CVE mapped"
            ) {
            cveCount++;
            }
        });

        if (openPortCount > 0) {
            addMapping(
            "A05:2021 Security Misconfiguration",
            "Open Network Services",
            "Medium",
            "Exposed services increase the public attack surface.",
            "Close unnecessary ports or restrict access using firewall rules."
            );

            grouped["A05:2021 Security Misconfiguration|Open Network Services"].count = openPortCount;
        }

        if (cveCount > 0) {
            addMapping(
            "A06:2021 Vulnerable and Outdated Components",
            "Known CVE Exposure",
            "High",
            "Detected services are mapped with known CVE references.",
            "Patch or upgrade affected services and monitor vulnerability advisories."
            );

            grouped["A06:2021 Vulnerable and Outdated Components|Known CVE Exposure"].count = cveCount;
        }

        return Object.values(grouped);
        }

    async function loadLatestRiskData() {
      try {
        let scan = JSON.parse(localStorage.getItem("latestFullReport"));

        if (!scan) {
          const res = await fetch("http://localhost:5000/full-scan-history");
          const data = await res.json();
          scan = data[0];
        }

        if (!scan) {
          riskContent.innerHTML = `
            <div class="glass-card">
              <h2>No Full Scan Data Found</h2>
              <p style="color:#cbd5e1; margin-top:10px;">
                Please run a Full Security Scan first.
              </p>
              <br>
              <button onclick="window.location.href='index.html'">Go to Scanner</button>
            </div>
          `;
          return;
        }

        renderRiskPage(scan);
        loadRiskTimeline();

      } catch (error) {
        riskContent.innerHTML = `
          <div class="glass-card">
            <h2>Risk Intelligence Loading Failed</h2>
            <p style="color:#cbd5e1; margin-top:10px;">
              Backend may not be running or full scan history is unavailable.
            </p>
          </div>
        `;
      }
    }

    async function loadRiskTimeline() {
  try {
    const res = await fetch("/full-scans", {
      headers: {
        Authorization: localStorage.getItem("token")
      }
    });

    const scans = await res.json();
    const timeline = document.getElementById("riskTimeline");

    if (!timeline) return;

    if (!scans.length) {
      timeline.innerHTML = "<p style='color:#cbd5e1;'>No historical scans found.</p>";
      return;
    }

    timeline.innerHTML = scans.slice(0, 10).map(scan => {
      const score = scan.riskScore ?? "N/A";
      const level = scan.riskLevel || "Unknown";

      const color =
        level === "Critical"
          ? "#ef4444"
          : level === "High"
          ? "#f97316"
          : level === "Medium"
          ? "#eab308"
          : "#22c55e";

      return `
        <div style="
          background: rgba(255,255,255,0.05);
          border-left: 5px solid ${color};
          padding: 16px;
          margin-bottom: 15px;
          border-radius: 14px;
        ">
          <div style="
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:15px;
            flex-wrap:wrap;
          ">
            <div>
              <strong>${scan.domain || "Unknown Domain"}</strong><br>
              <small style="color:#cbd5e1;">
                ${scan.scannedAt ? new Date(scan.scannedAt).toLocaleString() : "N/A"}
              </small>
            </div>

            <div style="text-align:right;">
              <strong>${score}/100</strong><br>
              <small style="color:${color};">
                ${level} Risk
              </small>
            </div>
          </div>
        </div>
      `;
    }).join("");

  } catch (error) {
    console.error("Timeline error:", error);
  }
}

    loadLatestRiskData();
  </script>
